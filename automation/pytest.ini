[pytest]
; ================================================================
; Swag Labs 自动化测试 — Pytest 全局配置
; ================================================================

; 测试发现路径
testpaths = testcases

; 命名规则
python_files      = test_*.py
python_classes    = Test*
python_functions  = test_*

; ── 默认运行选项 ──
; 注: --html 和 --alluredir 不放入 addopts，
;     避免 --collect-only 时生成空报告覆盖已有结果。
;     需要报告时显式传入:
;       pytest --html=reports/report.html --self-contained-html
;       pytest --alluredir=reports/allure-results --clean-alluredir
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

; ── 日志输出 ──
; 注意: log_cli=true 会把每条测试的完整日志写入 HTML 报告的 JSON blob，
;       日志量过大时会导致浏览器 JS 渲染失败（表格空白）。
;       需要查看报告时，建议关闭 log_cli 或改用 Allure。
log_cli             = false
log_cli_level       = WARNING
log_cli_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

; ── 自定义 markers（用于 pytest -m 过滤） ──
markers =
    smoke:      冒烟测试 — 核心交易链路快速验证
    regression: 回归测试 — 完整功能回归套件
    login:      登录模块（正常/异常场景）
    inventory:  商品列表模块（排序/筛选/详情）
    cart:       购物车模块（加购/移除/数量）
    checkout:   结账流程模块（信息填写/概览/完成）
    security:   安全测试（XSS/SQL注入/CSRF）
    slow:       慢速执行用例（performance_glitch_user）
    data_driven: 数据驱动测试（从 JSON/YAML 读取参数）
